<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transforme Seus Resultados</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0e0f14;
      color: #fff;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 80px 60px;
      background: linear-gradient(135deg, #0e0f14, #1b1c22);
    }

    .hero-container {
      max-width: 1200px;
      margin: auto;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 60px;
      align-items: center;
    }

    .hero-text h1 {
      font-size: 48px;
      line-height: 1.2;
      font-weight: 700;
    }

    .hero-text h1 span {
      color: #25d366;
    }

    .hero-text p {
      margin: 25px 0;
      font-size: 18px;
      opacity: 0.9;
    }

    .btn {
      display: inline-block;
      padding: 18px 36px;
      background: #25d366;
      color: #000;
      border-radius: 10px;
      font-size: 20px;
      font-weight: 700;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* MOCKUP / IMAGEM */
    .hero-image {
      background: #000;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 0 60px rgba(0,0,0,0.6);
    }

    .hero-image img {
      width: 100%;
      border-radius: 12px;
      display: block;
    }

    /* RESPONSIVO */
    @media (max-width: 900px) {
      .hero {
        padding: 60px 20px;
      }

      .hero-container {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .hero-text h1 {
        font-size: 38px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <div class="hero-container">

      <!-- TEXTO -->
      <div class="hero-text">
        <h1>
          Transforme seus resultados em  
          <span>poucas semanas</span>
        </h1>

        <p>
          Um método simples, testado e validado para quem quer sair do zero
          e alcançar resultados reais sem complicação.
        </p>

        <a class="btn" href="#">
          COMEÇAR AGORA
        </a>
      </div>

      <!-- IMAGEM / PRINT DA LP -->
      <div class="hero-image">
        <img src="img/lp-desktop.jpg" alt="Imagem">
      </div>

    </div>
  </section>

</body>
</html>
